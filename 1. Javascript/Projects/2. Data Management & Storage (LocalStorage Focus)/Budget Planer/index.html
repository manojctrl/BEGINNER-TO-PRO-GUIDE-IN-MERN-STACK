<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Budget Planner</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>📊 Monthly Budget Planner</h1>

    <!-- Month & Budget Setup -->
    <div class="setup-box">
      <div class="setup-row">
        <div class="field">
          <label>Month</label>
          <select id="monthSelect"></select>
        </div>
        <div class="field">
          <label>Year</label>
          <input type="number" id="yearInput" value="2025" min="2020" max="2100" />
        </div>
        <div class="field">
          <label>Monthly Budget (Rs.)</label>
          <input type="number" id="budgetInput" placeholder="e.g. 50000" min="0" />
        </div>
        <button id="setBudgetBtn">Set Budget</button>
      </div>
    </div>

    <!-- Summary Cards -->
    <div class="summary">
      <div class="card budget-card">
        <span>Total Budget</span>
        <p id="totalBudget">Rs. 0</p>
      </div>
      <div class="card spent-card">
        <span>Total Spent</span>
        <p id="totalSpent">Rs. 0</p>
      </div>
      <div class="card remaining-card">
        <span>Remaining</span>
        <p id="remaining">Rs. 0</p>
      </div>
    </div>

    <!-- Progress Bar -->
    <div class="progress-wrapper">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
      <span id="progressLabel">0% used</span>
    </div>

    <!-- Category Budget Setup -->
    <div class="section">
      <h2>📁 Category Limits</h2>
      <div class="cat-form">
        <input type="text" id="catName" placeholder="Category (e.g. Food)" />
        <input type="number" id="catLimit" placeholder="Limit (Rs.)" min="0" />
        <button id="addCatBtn">Add Category</button>
      </div>
      <ul id="categoryList"></ul>
    </div>

    <!-- Add Expense -->
    <div class="section">
      <h2>➕ Add Expense</h2>
      <div class="exp-form">
        <input type="text" id="expTitle" placeholder="Title (e.g. Groceries)" />
        <input type="number" id="expAmount" placeholder="Amount (Rs.)" min="0" />
        <select id="expCategory">
          <option value="">Select Category</option>
        </select>
        <button id="addExpBtn">Add</button>
      </div>
    </div>

    <!-- Expense List -->
    <div class="section">
      <h2>🧾 Expenses</h2>
      <ul id="expenseList"></ul>
      <p id="noExpMsg" class="empty-msg">No expenses added yet.</p>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
