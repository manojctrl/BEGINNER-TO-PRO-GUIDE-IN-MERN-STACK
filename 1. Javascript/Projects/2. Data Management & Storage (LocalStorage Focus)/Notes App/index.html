<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Live Notes</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <div class="card">
        <div class="header">
            <h2>Live Notes</h2>
            <span class="badge" id="status-badge">Saved</span>
        </div>
        <textarea placeholder="Start typing here, it saves automatically..." id="note-area"></textarea>
        <div class="footer">
            <span>Even if you close your browser, this note will not be lost </span>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
