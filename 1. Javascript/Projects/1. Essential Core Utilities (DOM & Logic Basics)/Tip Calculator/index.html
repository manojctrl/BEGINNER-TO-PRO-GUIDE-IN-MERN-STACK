<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Tip & Split Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator-container">
        <h2>Tip & Split Calculator</h2>
        
        <div class="input-group">
            <label for="bill-amount">Total Bill ($ / ₨)</label>
            <input type="number" id="bill-amount" min="0" placeholder="Enter total bill">
        </div>

        <div class="input-group">
            <label for="tip-slider">Tip Percentage: <span id="tip-val">15</span>%</label>
            <input type="range" id="tip-slider" min="0" max="50" value="15">
        </div>

        <div class="input-group">
            <label for="split-people">Split Between: <span id="split-val">1</span> Person(s)</label>
            <input type="range" id="split-people" min="1" max="20" value="1">
        </div>

        <hr>

        <div class="results">
            <div class="result-row">
                <span>Total Tip:</span>
                <span class="amount" id="total-tip">0.00</span>
            </div>
            <div class="result-row highlight">
                <span>Total Per Person:</span>
                <span class="amount" id="per-person-total">0.00</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
