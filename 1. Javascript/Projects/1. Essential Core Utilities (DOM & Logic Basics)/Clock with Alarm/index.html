<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Digital Clock & Alarm</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="clock-container">
        <div id="digital-clock">00:00:00 AM</div>
        
        <div class="alarm-section">
            <input type="time" id="alarm-time">
            <button id="set-alarm-btn">Set Alarm</button>
            <button id="clear-alarm-btn" class="hidden">Clear Alarm</button>
        </div>
        <div id="alarm-status">Alarm Not Set</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
